name: Create and Publish Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'main'

env:
  IMAGE_NAME: ethlocom/geodata-server

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm 
    runs-on: ${{ matrix.runs_on }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Set Version and Tag
        id: set_vars
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${{ github.ref_name }}
            VERSION=${VERSION#v}
          else
            VERSION="latest-SNAPSHOT"
          fi
          echo "MAVEN_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "DOCKER_ARCH_TAG=${VERSION}-${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Build Full Project
        # This installs sibling modules (service, importer) into the local .m2
        run: |
          mvn versions:set -DnewVersion=${{ env.MAVEN_VERSION }} -DskipTests
          mvn -B clean install -DskipTests

      - name: Build and Push Docker Image
        run: |
          # Now geodata-server can find its siblings in the local cache
          mvn -f geodata-server/pom.xml spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=${{ env.IMAGE_NAME }}:${{ env.DOCKER_ARCH_TAG }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        run: docker push ${{ env.IMAGE_NAME }}:${{ env.DOCKER_ARCH_TAG }}

  merge-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          # Determine the base tag (e.g., 1.2.0 or latest-SNAPSHOT)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
            TAG="${TAG#v}"
          else
            TAG="latest-SNAPSHOT"
          fi

          AMD_TAG="${{ env.IMAGE_NAME }}:${TAG}-amd64"
          ARM_TAG="${{ env.IMAGE_NAME }}:${TAG}-arm64"
          TARGET_TAG="${{ env.IMAGE_NAME }}:${TAG}"

          # Create the primary manifest
          docker manifest create ${TARGET_TAG} --amend ${AMD_TAG} --amend ${ARM_TAG}
          docker manifest push ${TARGET_TAG}

          # If it's a real version tag, also update 'latest'
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            LATEST_TAG="${{ env.IMAGE_NAME }}:latest"
            docker manifest create ${LATEST_TAG} --amend ${AMD_TAG} --amend ${ARM_TAG}
            docker manifest push ${LATEST_TAG}
          fi
